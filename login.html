<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- الهيدر -->
<header>
    <div class="logo"><a href="index.html">ADiOS</a></div>
    <nav>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a class="login-card" href="login.html">تسجيل الدخول</a></li>
        </ul>
    </nav>
</header>

<!-- صفحة تسجيل الدخول -->
<div class="auth-container">
    <div class="auth-box">

        <h2 class="neon-text-blue">تسجيل الدخول</h2>

        <!-- اسم المستخدم -->
        <label>اسم المستخدم</label>
        <input id="username" class="search-input" placeholder="مثال: samir123">

        <!-- كلمة المرور -->
        <label>كلمة المرور</label>
        <input id="password" type="password" class="search-input" placeholder="••••••••">

        <button class="search-btn w-100" onclick="login()">دخول</button>

        <p id="msg"></p>

        <p class="auth-switch">ليس لديك حساب؟ <span onclick="goRegister()">إنشاء حساب</span></p>
    </div>
</div>

<script>
function goRegister() {
    window.location.href = "register.html";
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    try {
        const response = await fetch("http://localhost:3000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.status === "success") {
            // تخزين التوكن
            localStorage.setItem("token", data.token);
            
            msg.style.color = "#00ffcc";
            msg.innerText = "تم تسجيل الدخول! جاري التحويل...";

            // التحويل المباشر
            console.log("نجح الدخول، يتم التحويل الآن إلى profile.html");
            window.location.href = "profile.html"; 
            
        } else {
            msg.style.color = "#ff3b3b";
            msg.innerText = data.message || "خطأ في الدخول";
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        msg.innerText = "تعذر الاتصال بالسيرفر";
    }
}

async function loadUserHeader() {
    const token = localStorage.getItem("token");
    const authArea = document.getElementById("authArea");

    // لو ما في تسجيل دخول → خليه يعرض زر تسجيل الدخول
    if (!token) return;

    const res = await fetch("http://localhost:3000/api/auth/profile", {
        method: "GET",
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    if (data.status !== "success") return;

    const user = data.user;

    // صورة افتراضية لو ما رفع صورة
    const img = user.profile_image
        ? `http://localhost:3000/uploads/${user.profile_image}`
        : "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    // استبدال زر تسجيل الدخول بالكامل
    authArea.innerHTML = `
        <div class="user-profile-wrapper" onclick="toggleDropdown()">
            <img src="${img}" class="dropdown-img" 
                 style="width:45px;height:45px;border-radius:50%;border:2px solid var(--neon-blue);cursor:pointer;">
        </div>

        <div id="profileDropdown" class="profile-dropdown hidden">
            <img src="${img}" class="dropdown-img" style="width:70px;height:70px;border-radius:50%;margin-bottom:10px;">
            <h3 style="color:white;margin:5px 0;">${user.name}</h3>
            <p style="color:#aaa;margin:0;">${user.email}</p>

            <hr style="border-color:#333;margin:15px 0;">

            <button class="search-btn w-100" onclick="window.location.href='profile.html'">
                زيارة ملفك الشخصي
            </button>

            <button class="search-btn w-100" style="margin-top:10px;background:#ff3b3b;" onclick="logout()">
                تسجيل الخروج
            </button>
        </div>
    `;
}

function toggleDropdown() {
    document.getElementById("profileDropdown").classList.toggle("hidden");
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

loadUserHeader();


</script>



</body>
</html>
